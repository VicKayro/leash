<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>leash — fleet</title>
<style>
  :root {
    --bg: #0b0f14; --panel: #11161d; --panel2: #151c25; --border: #1e2733;
    --text: #d7e0ea; --dim: #7a8899; --faint: #4a5462;
    --green: #4ade80; --amber: #fbbf24; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: 36px 18px 64px; max-width: 880px; margin: 0 auto;
  }
  a { color: var(--green); text-decoration: none; }
  header { display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 20px; letter-spacing: .5px; }
  header .beta { color: var(--amber); font-size: 11px; border: 1px solid var(--amber); border-radius: 4px; padding: 0 6px; }
  header .right { margin-left: auto; color: var(--faint); font-size: 12px; }

  /* Hero */
  .hero { text-align: center; padding: 44px 0 10px; }
  .hero .pre { color: var(--dim); font-size: 15px; }
  .hero .big { font-size: clamp(52px, 11vw, 92px); font-weight: 700; color: #fff; letter-spacing: -2px; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .hero .big .sign { color: var(--green); }
  .hero .post { color: var(--dim); font-size: 15px; margin-top: 2px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 18px 0 6px; }
  .chip { border: 1px solid var(--border); background: var(--panel); border-radius: 999px; padding: 4px 13px; font-size: 13px; color: var(--dim); }
  .chip b { color: var(--text); font-weight: 600; }
  .chip.live { border-color: var(--green); color: var(--green); }
  .chip .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 1.6s ease-out infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,.5) } 70% { box-shadow: 0 0 0 8px rgba(74,222,128,0) } 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0) } }
  @media (prefers-reduced-motion: reduce) { .chip .pulse { animation: none } }

  section { margin-top: 34px; }
  h2 { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 12px; }
  h2 .sub { text-transform: none; letter-spacing: 0; color: var(--faint); font-weight: 400; }

  /* Pulse chart */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .pulsechart { position: relative; height: 132px; display: flex; align-items: flex-end; gap: 2px; }
  .pulsechart .col { flex: 1; display: flex; align-items: flex-end; height: 100%; cursor: default; }
  .pulsechart .bar { width: 100%; background: var(--green); border-radius: 3px 3px 0 0; min-height: 2px; opacity: .82; }
  .pulsechart .col:hover .bar { opacity: 1; background: #7ce9a4; }
  .pulsechart .col.zero .bar { background: var(--border); opacity: 1; }
  .xlabels { display: flex; justify-content: space-between; color: var(--faint); font-size: 11px; margin-top: 8px; }
  #tip { position: fixed; pointer-events: none; background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text); z-index: 10; display: none; white-space: nowrap; }
  #tip b { color: var(--green); }

  /* Night replay */
  .night { display: flex; gap: 14px; align-items: center; margin-bottom: 10px; }
  .night .date { flex: none; width: 92px; color: var(--dim); font-size: 12px; text-align: right; }
  .night .total { flex: none; width: 70px; color: var(--dim); font-size: 12px; }
  .night .total b { color: var(--text); }
  .track { position: relative; flex: 1; height: 28px; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .track .tick { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); opacity: .6; }
  .sess { position: absolute; top: 5px; bottom: 5px; background: var(--green); opacity: .85; border-radius: 4px; min-width: 7px; cursor: default; }
  .sess:hover { opacity: 1; background: #7ce9a4; }
  .hourlabels { display: flex; justify-content: space-between; color: var(--faint); font-size: 11px; margin: 6px 0 0 106px; padding-right: 84px; }

  /* Fleet dots */
  .dots { display: flex; flex-wrap: wrap; gap: 7px; }
  .dot { width: 14px; height: 14px; border-radius: 4px; cursor: default; }
  .dot.ok { background: var(--green); opacity: .85; }
  .dot.warn { background: var(--amber); }
  .dot.bad { background: var(--red); animation: blink 1.4s ease-in-out infinite; }
  .dot.unknown { background: var(--border); }
  .dot:hover { outline: 2px solid #fff3; }
  @keyframes blink { 50% { opacity: .45 } }
  @media (prefers-reduced-motion: reduce) { .dot.bad { animation: none } }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; color: var(--dim); font-size: 12px; }
  .legend span::before { content: ''; display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 6px; }
  .legend .l-ok::before { background: var(--green) } .legend .l-warn::before { background: var(--amber) }
  .legend .l-bad::before { background: var(--red) } .legend .l-unknown::before { background: var(--border) }

  /* Attention */
  .attn { display: flex; flex-direction: column; gap: 8px; }
  .attn .row { display: flex; gap: 10px; align-items: baseline; background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--red); border-radius: 8px; padding: 10px 14px; }
  .attn .row.warn { border-left-color: var(--amber); }
  .attn .icon { flex: none; }
  .attn .name { color: #fff; font-weight: 600; }
  .attn .note { color: var(--dim); font-size: 13px; }
  .attn .src { margin-left: auto; color: var(--faint); font-size: 11px; white-space: nowrap; }
  .attn .fixhint { color: var(--faint); font-size: 12px; padding: 2px 4px 0; }
  .allgood { color: var(--green); background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }

  /* Facts */
  .facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
  .fact { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; font-size: 13px; color: var(--dim); }
  .fact b { color: var(--text); display: block; font-size: 16px; margin-bottom: 1px; }

  /* Machines */
  .machine { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .mrow { display: flex; flex-wrap: wrap; gap: 14px; align-items: baseline; }
  .mrow .host { color: #fff; font-weight: 600; }
  .mrow .meta { color: var(--faint); font-size: 12px; }
  .mrow .stats { margin-left: auto; color: var(--dim); font-size: 13px; display: flex; gap: 14px; }
  .mrow b { color: var(--text); }
  .gchip { font-size: 11px; border-radius: 4px; padding: 0 7px; }
  .gchip.on { color: var(--green); border: 1px solid var(--green); }
  .gchip.off { color: var(--amber); border: 1px solid var(--amber); }

  .empty, .error { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 28px; color: var(--dim); }
  code { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; color: var(--green); font-size: 13px; user-select: all; }
  footer { margin-top: 44px; color: var(--faint); font-size: 12px; line-height: 2; }
</style>
</head>
<body>
<header><h1>🐕 leash</h1><span class="beta">cloud beta</span><span class="right" id="stamp"></span></header>
<div id="app"><p style="color:var(--dim);margin-top:40px">loading fleet…</p></div>
<div id="tip"></div>
<footer id="foot"></footer>
<script>
const token = location.pathname.split('/').filter(Boolean).pop() || ''
const $app = document.getElementById('app')
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const usd = (n, d = 2) => '$' + (Number(n) || 0).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d })
const ago = (t) => {
  const s = (Date.now() - (typeof t === 'number' ? t : new Date(t).getTime())) / 1000
  if (!isFinite(s) || s < 0) return '?'
  if (s < 90) return 'just now'
  if (s < 5400) return Math.round(s / 60) + ' min ago'
  if (s < 129600) return Math.round(s / 3600) + ' h ago'
  return Math.round(s / 86400) + ' d ago'
}
const KIND = { 'github-actions': 'GitHub Actions', 'vercel-cron': 'Vercel', 'render-cron': 'Render', railway: 'Railway', 'cloudflare-worker': 'Cloudflare' }

function aggregate(ms) {
  const A = { cost: 0, sessions: 0, night: 0, tools: 0, windowDays: 30, daily: new Map(), agents: [], issues: [], lastActivity: 0, topSession: null, activeDays: 0, nights: [] }
  for (const m of ms) {
    const s = m.snapshot || {}
    A.cost += s.totals?.costUSD || 0
    A.sessions += s.totals?.sessions || 0
    A.night += s.insights?.nightSessions || 0
    A.tools += s.insights?.totalToolCalls || 0
    A.activeDays = Math.max(A.activeDays, s.insights?.activeDays || 0)
    A.windowDays = Math.max(A.windowDays, s.windowDays || 30)
    if (s.lastActivityAt) A.lastActivity = Math.max(A.lastActivity, s.lastActivityAt)
    const ts = s.insights?.topSession
    if (ts && (!A.topSession || ts.costUSD > A.topSession.costUSD)) A.topSession = ts
    for (const d of s.daily || []) A.daily.set(d.date, (A.daily.get(d.date) || 0) + d.costUSD)
    const host = m.machine?.host || '?'
    for (const n of s.nights || []) A.nights.push({ ...n, host })
    for (const i of s.scheduled?.issues || []) {
      const sev = i.problem === 'zombie' || i.problem === 'failing' ? 'bad' : 'warn'
      A.issues.push({ sev, name: i.label, note: i.problem + (i.schedule ? ' · ' + i.schedule : ''), src: host, local: true })
    }
    for (const i of s.cloudAgents?.issues || []) {
      A.issues.push({ sev: i.status === 'failing' ? 'bad' : 'warn', name: (i.name || '').startsWith('/') ? i.repo + i.name : i.repo + '/' + i.name, note: (KIND[i.kind] || i.kind) + ': ' + (i.note || i.status), src: 'cloud' })
    }
    // fleet dots: local scheduled agents (count only + issues carry names) + cloud agents
    const sched = s.scheduled || { total: 0, issues: [] }
    const badLocal = (sched.issues || []).map((i) => ({ st: i.problem === 'zombie' || i.problem === 'failing' ? 'bad' : 'warn', label: i.label + ' — ' + i.problem, host }))
    for (const b of badLocal) A.agents.push(b)
    for (let k = 0; k < Math.max(0, sched.total - badLocal.length); k++) A.agents.push({ st: 'ok', label: 'scheduled agent on ' + host, host })
    const ca = s.cloudAgents || {}
    const cloudIssueCount = (ca.issues || []).length
    for (const i of ca.issues || []) A.agents.push({ st: i.status === 'failing' ? 'bad' : 'warn', label: (i.repo || '') + '/' + (i.name || '') + ' — ' + (i.note || i.status), host: 'cloud' })
    const checkedOk = Math.max(0, (ca.checked || 0) - cloudIssueCount)
    for (let k = 0; k < checkedOk; k++) A.agents.push({ st: 'ok', label: 'cloud agent (checked live)', host: 'cloud' })
    for (let k = 0; k < Math.max(0, (ca.total || 0) - (ca.checked || 0)); k++) A.agents.push({ st: 'unknown', label: 'cloud agent (not checked — npx getleash link)', host: 'cloud' })
  }
  return A
}

function heroHTML(A, ms) {
  const monthly = A.cost * (30 / A.windowDays)
  const roi = monthly > 200 ? { m: monthly / 200, p: '$200/mo Max' } : monthly > 20 ? { m: monthly / 20, p: '$20/mo Pro' } : null
  const liveNow = A.lastActivity && Date.now() - A.lastActivity < 15 * 60_000
  const chips = []
  if (liveNow) chips.push(`<span class="chip live"><span class="pulse"></span>agents active ${esc(ago(A.lastActivity))}</span>`)
  if (roi) chips.push(`<span class="chip">≈ <b>${roi.m.toFixed(1)}×</b>&nbsp;a ${roi.p} subscription</span>`)
  chips.push(`<span class="chip"><b>${A.sessions.toLocaleString('en-US')}</b>&nbsp;sessions</span>`)
  if (A.night) chips.push(`<span class="chip">🌙 <b>${A.night}</b>&nbsp;ran while you slept</span>`)
  if (ms.length > 1) chips.push(`<span class="chip"><b>${ms.length}</b>&nbsp;machines</span>`)
  return `<div class="hero">
    <div class="pre">Your agents did</div>
    <div class="big"><span class="sign">$</span><span id="bignum" data-target="${A.cost.toFixed(0)}">0</span></div>
    <div class="post">of AI work in the last ${A.windowDays} days${A.cost === 0 ? ' — run some agents and come back' : ''}</div>
    <div class="chips">${chips.join('')}</div>
  </div>`
}

function pulseHTML(A) {
  const days = [...A.daily.entries()].sort((a, b) => a[0].localeCompare(b[0])).slice(-30)
  if (days.length < 2) return ''
  const max = Math.max(0.01, ...days.map((d) => d[1]))
  const cols = days.map(([date, c]) => {
    const h = c > 0 ? Math.max(4, Math.round((c / max) * 100)) : 2
    return `<div class="col${c === 0 ? ' zero' : ''}" data-tip="${esc(date)} — <b>${usd(c)}</b>"><div class="bar" style="height:${h}%"></div></div>`
  }).join('')
  const busiest = days.reduce((a, b) => (b[1] > a[1] ? b : a))
  return `<section><h2>The pulse <span class="sub">· busiest day ${esc(busiest[0])} (${usd(busiest[1])})</span></h2>
    <div class="card"><div class="pulsechart">${cols}</div>
    <div class="xlabels"><span>${esc(days[0][0])}</span><span>${esc(days[Math.floor(days.length / 2)][0])}</span><span>${esc(days[days.length - 1][0])}</span></div></div>
  </section>`
}

// The night replay: one 00:00→07:00 track per night, sessions placed at the
// hour they actually ran. The block is the session's overlap with that night.
function nightsHTML(A, ms) {
  if (!A.nights.length) return ''
  const byNight = new Map()
  for (const n of A.nights) {
    const start = new Date(n.startTs)
    // which morning does this session's night portion belong to?
    const morning = new Date(start)
    if (start.getHours() >= 7) morning.setDate(morning.getDate() + 1)
    morning.setHours(0, 0, 0, 0)
    const m0 = morning.getTime(), m7 = m0 + 7 * 3600e3
    const b0 = Math.max(n.startTs, m0), b1 = Math.min(Math.max(n.endTs, n.startTs), m7)
    if (b1 <= m0 || b0 >= m7) continue
    const key = morning.toISOString().slice(0, 10)
    if (!byNight.has(key)) byNight.set(key, [])
    byNight.get(key).push({ ...n, b0: Math.max(b0, m0), b1: Math.max(Math.min(b1, m7), Math.max(b0, m0) + 5 * 60e3), m0 })
  }
  const nights = [...byNight.entries()].sort((a, b) => b[0].localeCompare(a[0])).slice(0, 5)
  if (!nights.length) return ''
  const fmt = (t) => new Date(t).toTimeString().slice(0, 5)
  const dlabel = (key) => new Date(key + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
  const ticks = [1, 2, 3, 4, 5, 6].map((h) => `<div class="tick" style="left:${(h / 7) * 100}%"></div>`).join('')
  const rows = nights.map(([key, list]) => {
    const total = list.reduce((a, s) => a + (s.costUSD || 0), 0)
    const blocks = list.map((s) => {
      const left = ((s.b0 - s.m0) / (7 * 3600e3)) * 100
      const width = Math.max(1.2, ((s.b1 - s.b0) / (7 * 3600e3)) * 100)
      const hostTag = ms.length > 1 ? ' · ' + esc(s.host) : ''
      return `<div class="sess" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%" data-tip="<b>${esc(s.project)}</b> — ${fmt(s.b0)}→${fmt(s.b1)} · ${usd(s.costUSD)} · ${(s.toolCalls || 0).toLocaleString('en-US')} tool calls${hostTag}"></div>`
    }).join('')
    return `<div class="night"><span class="date">${esc(dlabel(key))}</span><div class="track">${ticks}${blocks}</div><span class="total"><b>${usd(total, 0)}</b></span></div>`
  }).join('')
  const totalCost = A.nights.reduce((a, n) => a + (n.costUSD || 0), 0)
  return `<section><h2>🌙 While you slept <span class="sub">· ${A.night} night session${A.night > 1 ? 's' : ''} · ${usd(totalCost, 0)} of work between midnight and 7am</span></h2>
    <div class="card">${rows}<div class="hourlabels"><span>12am</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7am</span></div></div>
  </section>`
}

function fleetHTML(A) {
  if (!A.agents.length) return ''
  const rank = { bad: 0, warn: 1, unknown: 2, ok: 3 }
  const dots = [...A.agents].sort((a, b) => rank[a.st] - rank[b.st])
    .map((a) => `<div class="dot ${a.st}" data-tip="${esc(a.label)}"></div>`).join('')
  const n = (st) => A.agents.filter((a) => a.st === st).length
  const bad = n('bad'), warn = n('warn')
  const state = bad + warn === 0 ? 'all healthy' : `${bad + warn} need${bad + warn === 1 ? 's' : ''} attention`
  return `<section><h2>Your fleet <span class="sub">· ${A.agents.length} agents · ${state}</span></h2>
    <div class="card"><div class="dots">${dots}</div>
    <div class="legend">${bad ? `<span class="l-bad">${bad} down</span>` : ''}${warn ? `<span class="l-warn">${warn} at risk</span>` : ''}<span class="l-ok">${n('ok')} healthy</span>${n('unknown') ? `<span class="l-unknown">${n('unknown')} unchecked</span>` : ''}</div></div>
  </section>`
}

function attnHTML(A, watchdog) {
  const wdCta = watchdog
    ? ''
    : `<div class="fixhint">🐕 Don't wait to look — arm the watchdog and get pinged on Discord the moment this happens (free during beta): <code>npx getleash watchdog --discord &lt;webhook-url&gt;</code></div>`
  if (!A.issues.length) return `<section><h2>Needs attention</h2><div class="allgood">✓ Nothing. Every agent leash can see is healthy — enjoy it while it lasts.</div>${wdCta}</section>`
  const rows = A.issues.sort((a, b) => (a.sev === 'bad' ? 0 : 1) - (b.sev === 'bad' ? 0 : 1)).map((i) =>
    `<div class="row ${i.sev}"><span class="icon">${i.sev === 'bad' ? '✗' : '⚠'}</span><span class="name">${esc(i.name)}</span><span class="note">${esc(i.note)}</span><span class="src">${esc(i.src)}</span></div>`).join('')
  const hasLocal = A.issues.some((i) => i.local)
  return `<section><h2>Needs attention <span class="sub">· ${A.issues.length}</span></h2><div class="attn">${rows}
    ${hasLocal ? `<div class="fixhint">→ run <code>npx getleash</code> on that machine: the report gives the exact copy-paste fix for each one.</div>` : ''}${wdCta}</div></section>`
}

function factsHTML(A, ms) {
  const f = []
  if (A.topSession && A.topSession.costUSD >= 1) f.push(`<div class="fact"><b>${usd(A.topSession.costUSD)}</b>💸 biggest single session — ${esc(A.topSession.project)}, ${esc(A.topSession.date)}</div>`)
  if (A.activeDays) f.push(`<div class="fact"><b>${A.activeDays} / ${Math.min(A.windowDays, 30)} days</b>⚡ your agents worked</div>`)
  if (A.tools) f.push(`<div class="fact"><b>${A.tools.toLocaleString('en-US')}</b>🔧 tool calls executed</div>`)
  const guards = ms.filter((m) => m.snapshot?.guard).length
  f.push(guards === ms.length
    ? `<div class="fact"><b>guard on</b>🛡 every machine has a spend cap</div>`
    : `<div class="fact"><b>${ms.length - guards} machine${ms.length - guards > 1 ? 's' : ''} uncapped</b>🛡 fix: <code>npx getleash guard --daily 25</code></div>`)
  return f.length ? `<section><h2>The month in agents</h2><div class="facts">${f.join('')}</div></section>` : ''
}

function machinesHTML(ms) {
  const rows = ms.map((m) => {
    const s = m.snapshot || {}
    const g = s.guard
    return `<div class="machine"><div class="mrow">
      <span class="host">${esc(m.machine?.host)}</span>
      <span class="meta">${esc(m.machine?.platform)} · getleash ${esc(m.machine?.cliVersion)} · pushed ${esc(ago(m.receivedAt))}</span>
      <span class="stats"><span><b>${usd(s.totals?.costUSD || 0, 0)}</b>/${s.windowDays || 30}d</span><span><b>${s.totals?.sessions ?? 0}</b> sessions</span>
      <span class="gchip ${g ? 'on' : 'off'}">${g ? 'guard ' + [g.dailyUSD && usd(g.dailyUSD, 0) + '/d', g.hourlyUSD && usd(g.hourlyUSD, 0) + '/h'].filter(Boolean).join(' ') : 'no guard'}</span></span>
    </div></div>`
  }).join('')
  return `<section><h2>Machines <span class="sub">· ${ms.length}</span></h2>${rows}</section>`
}

function countUp() {
  const el = document.getElementById('bignum')
  if (!el) return
  const target = Number(el.dataset.target) || 0
  if (matchMedia('(prefers-reduced-motion: reduce)').matches || target === 0) {
    el.textContent = target.toLocaleString('en-US')
    return
  }
  const t0 = performance.now()
  const dur = 1100
  const step = (t) => {
    const p = Math.min(1, (t - t0) / dur)
    el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3))).toLocaleString('en-US')
    if (p < 1) requestAnimationFrame(step)
  }
  requestAnimationFrame(step)
}

function wireTips() {
  const tip = document.getElementById('tip')
  document.querySelectorAll('[data-tip]').forEach((el) => {
    el.addEventListener('mouseenter', () => { tip.innerHTML = el.dataset.tip; tip.style.display = 'block' })
    el.addEventListener('mousemove', (e) => {
      tip.style.left = Math.min(e.clientX + 12, innerWidth - tip.offsetWidth - 8) + 'px'
      tip.style.top = (e.clientY - tip.offsetHeight - 10 < 8 ? e.clientY + 16 : e.clientY - tip.offsetHeight - 10) + 'px'
    })
    el.addEventListener('mouseleave', () => { tip.style.display = 'none' })
  })
}

async function load() {
  const foot = document.getElementById('foot')
  if (!/^flt_[a-f0-9]{16,64}$/.test(token)) {
    $app.innerHTML = '<div class="error" style="margin-top:32px">Invalid fleet URL. Run <code>npx -y getleash connect</code> to get yours.</div>'
    return
  }
  let data
  try {
    const r = await fetch('/api/fleet?token=' + token)
    data = await r.json()
    if (!r.ok) throw new Error(data.error || r.status)
  } catch (e) {
    $app.innerHTML = '<div class="error" style="margin-top:32px">Could not load fleet: ' + esc(e.message) + '</div>'
    return
  }
  const ms = data.machines || []
  foot.innerHTML = `Add a machine to this fleet: <code>npx -y getleash connect --fleet ${esc(token)}</code><br>
    Metrics only — leash never uploads prompts, transcripts, file paths or contents. This URL is private: anyone who has it can read these metrics.<br>
    <a href="https://github.com/VicKayro/leash">github.com/VicKayro/leash</a> · MIT · <code>npx getleash</code> for the full report`
  if (!ms.length) {
    $app.innerHTML = `<div class="empty" style="margin-top:32px">No machines yet. On the machine you want to watch, run:<br><br><code>npx -y getleash connect --fleet ${esc(token)}</code></div>`
    return
  }
  const A = aggregate(ms)
  document.getElementById('stamp').textContent = (data.watchdog ? '🐕 watchdog armed · ' : '') + 'updated ' + ago(ms[0].receivedAt)
  $app.innerHTML = heroHTML(A, ms) + attnHTML(A, data.watchdog) + nightsHTML(A, ms) + pulseHTML(A) + fleetHTML(A) + factsHTML(A, ms) + machinesHTML(ms)
  document.title = `leash — ${usd(A.cost, 0)} / ${A.windowDays}d`
  countUp()
  wireTips()
}
load()
</script>
</body>
</html>
